/* ---------------------------------------------------------------------------
   Carnet — a study desk
   Palette: oat paper / ink / bordeaux. Display: Fraunces. Body: Hanken Grotesk.
--------------------------------------------------------------------------- */

const T = {
  bg: "#ECE6DA",
  surface: "#FAF6EE",
  surfaceAlt: "#F3EDE1",
  ink: "#211C18",
  inkSoft: "#75695A",
  inkFaint: "#9C8F7C",
  line: "#DED4C2",
  accent: "#7B2D3A",
  accentSoft: "#EFE0E1",
  green: "#5E7355",
  amber: "#B07A2E",
  red: "#A23B33",
};

const COURSE_COLORS = [
  { name: "Sage", hex: "#7E8B6F" },
  { name: "Ochre", hex: "#C08A3E" },
  { name: "Dusty blue", hex: "#6E8499" },
  { name: "Clay", hex: "#B0654E" },
  { name: "Plum", hex: "#6E4B63" },
  { name: "Slate", hex: "#5E6B6B" },
];

const TYPES = ["Essay", "Exam", "Reading", "Quiz", "Project", "Problem set"];
const LEITNER_DAYS = [0, 1, 3, 7, 16, 35]; // box 0..5

// Standard 4.0 GPA scale. A+ caps at 4.0, which matches most schools.
const GRADE_POINTS = {
  "A+": 4.0, "A": 4.0, "A-": 3.7,
  "B+": 3.3, "B": 3.0, "B-": 2.7,
  "C+": 2.3, "C": 2.0, "C-": 1.7,
  "D+": 1.3, "D": 1.0, "D-": 0.7,
  "F": 0.0,
};
const GRADE_OPTIONS = Object.keys(GRADE_POINTS);

// UBC undergraduate percentage → letter scale (official ranges).
const UBC_SCALE = [
  { min: 90, letter: "A+" },
  { min: 85, letter: "A" },
  { min: 80, letter: "A-" },
  { min: 76, letter: "B+" },
  { min: 72, letter: "B" },
  { min: 68, letter: "B-" },
  { min: 64, letter: "C+" },
  { min: 60, letter: "C" },
  { min: 55, letter: "C-" },
  { min: 50, letter: "D" },
  { min: 0, letter: "F" },
];
const UBC_LETTERS = UBC_SCALE.map((s) => s.letter);
function letterFromPercent(p) {
  if (p === "" || p === null || p === undefined || isNaN(Number(p))) return "";
  const n = Number(p);
  for (const b of UBC_SCALE) if (n >= b.min) return b.letter;
  return "F";
}

const uid = () => Math.random().toString(36).slice(2, 10);
const todayISO = () => new Date().toISOString().slice(0, 10);
const daysBetween = (a, b) =>
  Math.round((new Date(a + "T00:00") - new Date(b + "T00:00")) / 86400000);

/* ---------- storage helpers ---------- */
const persist = (key, value) => {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
};
const loadKey = (key, fallback) => {
  try { const r = localStorage.getItem(key); return r != null ? JSON.parse(r) : fallback; }
  catch (e) { return fallback; }
};
let ANTHROPIC_KEY = (() => { try { return localStorage.getItem("uni:anthropicKey") || ""; } catch (e) { return ""; } })();

/* ---------- Claude (built into the app) ---------- */
async function askClaude(system, userText, maxTokens = 1200) {
  if (!ANTHROPIC_KEY) throw new Error("NO_KEY");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": ANTHROPIC_KEY, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: maxTokens,
      system,
      messages: [{ role: "user", content: userText }],
    }),
  });
  const data = await res.json();
  return (data.content || [])
    .filter((b) => b.type === "text")
    .map((b) => b.text)
    .join("\n")
    .trim();
}

// content can mix text + image blocks (for screenshot parsing)
async function askClaudeParts(system, content, maxTokens = 1600) {
  if (!ANTHROPIC_KEY) throw new Error("NO_KEY");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": ANTHROPIC_KEY, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: maxTokens, system, messages: [{ role: "user", content }] }),
  });
  const data = await res.json();
  return (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();
}

// pull the first JSON object/array out of a model reply, tolerant of fences/prose
function parseJSONLoose(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  const ob = clean.indexOf("{"), oe = clean.lastIndexOf("}");
  const ab = clean.indexOf("["), ae = clean.lastIndexOf("]");
  let slice = clean;
  if (ob !== -1 && oe !== -1 && (ab === -1 || ob < ab)) slice = clean.slice(ob, oe + 1);
  else if (ab !== -1 && ae !== -1) slice = clean.slice(ab, ae + 1);
  return JSON.parse(slice);
}

/* ===========================================================================
   App
=========================================================================== */
function Carnet() {
  const [tab, setTab] = useState("today");
  const [ready, setReady] = useState(false);
  const [unlocked, setUnlocked] = useState(false);
  const [importing, setImporting] = useState(false);
  const loaded = useRef(false);

  const [courses, setCourses] = useState([]);
  const [assignments, setAssignments] = useState([]);
  const [notes, setNotes] = useState([]);
  const [cards, setCards] = useState([]);
  const [papers, setPapers] = useState([]);
  const [schedule, setSchedule] = useState([]);
  const [grades, setGrades] = useState([]);

  // live Canvas connection
  const [canvasEndpoint, setCanvasEndpointState] = useState("");
  const [syncing, setSyncing] = useState(false);
  const [syncErr, setSyncErr] = useState("");
  const [syncMsg, setSyncMsg] = useState("");
  const [lastSync, setLastSync] = useState("");
  const autoSynced = useRef(false);

  const setCanvasEndpoint = (url) => { setCanvasEndpointState(url); persist("uni:canvasEndpoint", url); };

  // Login: verify the typed password against the server secret by trying the
  // keyed feed. Right password -> the feed returns 200 -> unlock + remember it.
  const tryUnlock = async (pw) => {
    const clean = (pw || "").trim();
    if (!clean) return false;
    const ep = window.location.origin + "/api/canvas?key=" + encodeURIComponent(clean);
    try {
      const res = await fetch(ep);
      const data = await res.json().catch(() => ({}));
      if (!res.ok || data.error) return false;
      setCanvasEndpoint(ep);
      setUnlocked(true);
      return true;
    } catch (e) { return false; }
  };

  useEffect(() => {
    (async () => {
      const [c, a, n, cd, p, sc, g] = await Promise.all([
        loadKey("uni:courses", []),
        loadKey("uni:assignments", []),
        loadKey("uni:notes", []),
        loadKey("uni:cards", []),
        loadKey("uni:papers", []),
        loadKey("uni:schedule", []),
        loadKey("uni:grades", []),
      ]);
      setCourses(c); setAssignments(a); setNotes(n); setCards(cd); setPapers(p); setSchedule(sc); setGrades(g);
      const [ep, ls] = await Promise.all([loadKey("uni:canvasEndpoint", ""), loadKey("uni:lastSync", "")]);
      const hasKey = !!(ep && /[?&]key=/.test(ep));
      setCanvasEndpointState(hasKey ? ep : "");
      setUnlocked(hasKey);
      setLastSync(ls);
      loaded.current = true; setReady(true);
    })();
  }, []);

  useEffect(() => { if (loaded.current) persist("uni:courses", courses); }, [courses]);
  useEffect(() => { if (loaded.current) persist("uni:assignments", assignments); }, [assignments]);
  useEffect(() => { if (loaded.current) persist("uni:notes", notes); }, [notes]);
  useEffect(() => { if (loaded.current) persist("uni:cards", cards); }, [cards]);
  useEffect(() => { if (loaded.current) persist("uni:papers", papers); }, [papers]);
  useEffect(() => { if (loaded.current) persist("uni:schedule", schedule); }, [schedule]);
  useEffect(() => { if (loaded.current) persist("uni:grades", grades); }, [grades]);

  const courseById = (id) => courses.find((c) => c.id === id);

  // pull live deadlines from the Canvas bridge, merge without duplicating
  const syncCanvas = async (endpointArg) => {
    const endpoint = endpointArg || canvasEndpoint;
    if (!endpoint) return;
    setSyncing(true); setSyncErr(""); setSyncMsg("");
    try {
      const res = await fetch(endpoint);
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || ("status " + res.status));
      const incoming = Array.isArray(data.assignments) ? data.assignments : [];

      const workingCourses = [...courses];
      const findOrCreate = (name, code) => {
        const nm = (name || "").trim(), cd = (code || "").trim();
        if (!nm && !cd) return null;
        const hit = workingCourses.find((x) =>
          (nm && x.name.toLowerCase() === nm.toLowerCase()) ||
          (cd && x.code && x.code.toLowerCase() === cd.toLowerCase()));
        if (hit) return hit.id;
        const color = COURSE_COLORS[workingCourses.length % COURSE_COLORS.length].hex;
        const nc = { id: uid(), name: nm || cd, code: cd, color };
        workingCourses.push(nc);
        return nc.id;
      };

      const workingA = assignments.map((a) => ({ ...a }));
      const byCanvas = new Map(workingA.filter((a) => a.canvasId).map((a) => [String(a.canvasId), a]));
      let added = 0, updated = 0;
      for (const it of incoming) {
        // The Canvas feed sometimes folds long lines, leaving course empty and a
        // "[Course Name" fragment stuck on the title. Recover it cleanly here.
        let title = it.title || "Untitled";
        let course = (it.course || "").trim();
        const code = (it.code || "").trim();
        if (!course) {
          const b = title.lastIndexOf("[");
          if (b > 0) {
            course = title.slice(b + 1).replace(/\]\s*$/, "").trim();
            title = title.slice(0, b).trim();
          }
        } else if (title.includes("[")) {
          title = title.replace(/\s*\[[^\]]*\]?\s*$/, "").trim();
        }
        if (!title) title = "Untitled";

        const courseId = findOrCreate(course, code);
        if (!courseId) continue;
        const cid = it.canvasId != null ? String(it.canvasId) : null;
        const existing = cid ? byCanvas.get(cid) : null;
        if (existing) {
          let changed = false;
          if (title && existing.title !== title) { existing.title = title; changed = true; }
          if (it.due && existing.due !== it.due) { existing.due = it.due; changed = true; }
          existing.courseId = courseId;
          if (it.url) existing.canvasUrl = it.url;
          if (changed) updated++;
        } else {
          workingA.push({
            id: uid(), canvasId: cid, courseId,
            title, due: it.due || "",
            type: TYPES.includes(it.type) ? it.type : "Essay",
            status: "todo", canvasUrl: it.url || "",
          });
          added++;
        }
      }
      setCourses(workingCourses);
      setAssignments(workingA);
      const stamp = new Date().toISOString();
      setLastSync(stamp); persist("uni:lastSync", stamp);
      setSyncMsg(added || updated ? `Synced — ${added} new, ${updated} updated.` : "Synced — already up to date.");
    } catch (e) {
      setSyncErr("Couldn't reach your Canvas endpoint. Check the URL and that the function is deployed.");
    }
    setSyncing(false);
  };

  useEffect(() => {
    if (ready && canvasEndpoint && !autoSynced.current) { autoSynced.current = true; syncCanvas(canvasEndpoint); }
  }, [ready, canvasEndpoint]);

  const tabs = [
    { id: "today", label: "Today", Icon: Sun },
    { id: "courses", label: "Courses", Icon: BookOpen },
    { id: "notes", label: "Notes", Icon: FileText },
    { id: "cards", label: "Cards", Icon: Layers },
    { id: "writing", label: "Writing", Icon: PenLine },
    { id: "gpa", label: "GPA", Icon: Calculator },
  ];

  if (ready && !unlocked) return <LockScreen onTry={tryUnlock} />;

  return (
    <div style={{ background: T.bg, color: T.ink, minHeight: "100vh", fontFamily: "'Hanken Grotesk', system-ui, sans-serif" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
        .disp { font-family: 'Fraunces', Georgia, serif; }
        *::placeholder { color: ${T.inkFaint}; }
        textarea, input, select { outline: none; }
        textarea:focus, input:focus, select:focus { border-color: ${T.accent} !important; }
        .cn-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .cn-scroll::-webkit-scrollbar-thumb { background: ${T.line}; border-radius: 8px; }
        button { font-family: inherit; }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
      `}</style>

      {/* Header */}
      <header className="flex items-center justify-between px-5 sm:px-8 pt-6 pb-4 max-w-5xl mx-auto">
        <div className="flex items-baseline gap-2">
          <span className="disp" style={{ fontSize: 30, fontWeight: 600, letterSpacing: "-0.02em" }}>Carnet</span>
          <span style={{ color: T.inkFaint, fontSize: 12, letterSpacing: "0.18em", textTransform: "uppercase" }}>study desk</span>
        </div>
        <div className="flex items-center gap-2 sm:gap-3">
          {canvasEndpoint && (
            <button onClick={() => syncCanvas()} disabled={syncing}
              title={lastSync ? `Last synced ${new Date(lastSync).toLocaleString()}` : "Sync Canvas now"}
              className="flex items-center gap-1.5 px-2.5 py-2 rounded-lg transition-colors"
              style={{ border: `1px solid ${T.line}`, background: T.surface, color: syncErr ? T.red : T.green, fontSize: 12.5, fontWeight: 600, cursor: "pointer" }}>
              <RefreshCw size={14} className={syncing ? "animate-spin" : ""} /> {syncing ? "Syncing" : "Canvas"}
            </button>
          )}
          <button onClick={() => setImporting(true)}
            className="flex items-center gap-1.5 px-3 py-2 rounded-lg transition-colors"
            style={{ border: `1px solid ${T.line}`, background: T.surface, color: T.inkSoft, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
            <Link2 size={15} /> Connect
          </button>
          <DateBadge />
        </div>
      </header>

      {/* Tabs */}
      <nav className="max-w-5xl mx-auto px-3 sm:px-8">
        <div className="cn-scroll flex gap-1 overflow-x-auto pb-1" style={{ borderBottom: `1px solid ${T.line}` }}>
          {tabs.map(({ id, label, Icon }) => {
            const active = tab === id;
            return (
              <button
                key={id}
                onClick={() => setTab(id)}
                className="flex items-center gap-2 px-4 py-2.5 rounded-t-lg whitespace-nowrap transition-colors"
                style={{
                  color: active ? T.accent : T.inkSoft,
                  borderBottom: active ? `2px solid ${T.accent}` : "2px solid transparent",
                  fontWeight: active ? 600 : 500,
                  fontSize: 14.5,
                  marginBottom: -1,
                }}
              >
                <Icon size={16} strokeWidth={2.2} />
                {label}
              </button>
            );
          })}
        </div>
      </nav>

      <main className="max-w-5xl mx-auto px-5 sm:px-8 py-7">
        {!ready ? (

function Btn({ children, onClick, kind = "primary", size = "md", disabled }) {

    ghost: { background: "transparent", color: T.inkSoft, border: `1px solid ${T.line}` },

function Dot({ hex, size = 9 }) {
  return <span style={{ width: size, height: size, borderRadius: 99, background: hex, display: "inline-block", flexShrink: 0 }} />;
}

function urgency(days) {
  if (days < 0) return { label: `${Math.abs(days)}d overdue`, color: T.red };
  if (days === 0) return { label: "Today", color: T.red };
  if (days === 1) return { label: "Tomorrow", color: T.amber };
  if (days <= 3) return { label: `In ${days} days`, color: T.amber };
  if (days <= 7) return { label: `In ${days} days`, color: T.inkSoft };
  return { label: `In ${days} days`, color: T.inkFaint };
}

function Empty({ icon: Icon, title, sub, action }) {

}

function Label({ children }) {
  return <div style={{ color: T.inkSoft, fontSize: 12, fontWeight: 600, marginBottom: 5, letterSpacing: "0.02em" }}>{children}</div>;

function CourseCard({ course, assignments, setAssignments, allAssignments, onRemove }) {
  const [adding, setAdding] = useState(false);
  const [title, setTitle] = useState("");
  const [due, setDue] = useState(todayISO());
  const [type, setType] = useState("Essay");

  const add = () => {
    if (!title.trim()) return;
    setAssignments([...allAssignments, { id: uid(), courseId: course.id, title: title.trim(), due, type, status: "todo" }]);
    setTitle(""); setType("Essay"); setAdding(false);
  };
  const update = (id, patch) => setAssignments(allAssignments.map((a) => (a.id === id ? { ...a, ...patch } : a)));
  const del = (id) => setAssignments(allAssignments.filter((a) => a.id !== id));

  const sorted = [...assignments].sort((a, b) => (a.due < b.due ? -1 : 1));

  return (
    <div className="rounded-2xl overflow-hidden" style={{ background: T.surface, border: `1px solid ${T.line}` }}>
      <div className="flex items-center gap-3 px-4 py-3" style={{ background: T.surfaceAlt, borderBottom: `1px solid ${T.line}` }}>
        <Dot hex={course.color} size={11} />
        <div className="flex-1">
          <span className="disp" style={{ fontSize: 18, fontWeight: 500 }}>{course.name}</span>
          {course.code && <span style={{ color: T.inkFaint, fontSize: 13, marginLeft: 8 }}>{course.code}</span>}
        </div>
        <button onClick={onRemove} title="Remove course" style={{ color: T.inkFaint, cursor: "pointer" }}><Trash2 size={15} /></button>
      </div>

      <div className="px-3 py-2">
        {sorted.length === 0 && !adding && (
          <div className="px-2 py-3" style={{ color: T.inkFaint, fontSize: 13.5 }}>No deadlines yet.</div>
        )}
        {sorted.map((a) => {
          const days = a.due ? daysBetween(a.due, todayISO()) : null;
          const u = days === null ? null : urgency(days);
          const done = a.status === "done";
          return (
            <div key={a.id} className="flex items-center gap-3 px-2 py-2.5" style={{ borderBottom: `1px solid ${T.line}` }}>
              <button onClick={() => update(a.id, { status: done ? "todo" : "done" })}
                style={{ width: 20, height: 20, borderRadius: 6, border: `1.5px solid ${done ? T.green : T.line}`, background: done ? T.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0 }}>
                {done && <Check size={13} color="#fff" strokeWidth={3} />}
              </button>
              <div className="flex-1 min-w-0">
                <div className="truncate" style={{ fontSize: 14.5, fontWeight: 500, textDecoration: done ? "line-through" : "none", color: done ? T.inkFaint : T.ink }}>{a.title}</div>
                <div style={{ color: T.inkFaint, fontSize: 12 }}>{a.type} · {a.due ? `due ${a.due}` : "no date set"}</div>
              </div>
              {!done && u && <span style={{ color: u.color, fontSize: 12.5, fontWeight: 600, whiteSpace: "nowrap" }}>{u.label}</span>}
              <button onClick={() => del(a.id)} style={{ color: T.inkFaint, cursor: "pointer" }}><X size={15} /></button>
            </div>
          );
        })}

        {adding ? (
          <div className="flex flex-col sm:flex-row gap-2 p-2">
            <input style={{ ...inputStyle, flex: 2 }} value={title} placeholder="What's due?" autoFocus
              onChange={(e) => setTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} />
            <input type="date" style={{ ...inputStyle, flex: 1 }} value={due} onChange={(e) => setDue(e.target.value)} />
            <select style={{ ...inputStyle, flex: 1 }} value={type} onChange={(e) => setType(e.target.value)}>
              {TYPES.map((t) => <option key={t}>{t}</option>)}
            </select>
            <Btn size="sm" onClick={add}>Add</Btn>
            <Btn size="sm" kind="ghost" onClick={() => setAdding(false)}>Cancel</Btn>
          </div>
        ) : (
          <button onClick={() => setAdding(true)} className="flex items-center gap-2 px-2 py-2.5"
            style={{ color: T.accent, fontSize: 13.5, fontWeight: 600, cursor: "pointer" }}>
            <Plus size={15} /> Add deadline
          </button>
        )}
      </div>
    </div>
  );
}

/* ===========================================================================
   GPA CALCULATOR
=========================================================================== */
function gpaPoints(grade) {
  return GRADE_POINTS.hasOwnProperty(grade) ? GRADE_POINTS[grade] : null;
}

// A row's effective letter: derived from the percentage if one is set,
// otherwise the letter the student picked by hand.
function rowLetter(r) {
  return letterFromPercent(r.percent) || r.grade || "";
}

function computeGPA(rows) {
  let pts = 0, cr = 0;
  for (const r of rows) {
    const gp = gpaPoints(rowLetter(r));
    const credits = Number(r.credits);
    if (gp === null || !(credits > 0)) continue;
    pts += gp * credits;
    cr += credits;
  }
  return { gpa: cr > 0 ? pts / cr : null, credits: cr };
}

// Letter shown as a read-only pill (when it comes from a percentage).
function LetterPill({ letter }) {
  return (
    <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", minWidth: 44, padding: "5px 8px", borderRadius: 8, background: letter ? T.accentSoft : "transparent", border: letter ? "none" : `1px solid ${T.line}`, color: letter ? T.accent : T.inkFaint, fontSize: 13.5, fontWeight: 700 }}>
      {letter || "—"}
    </span>
  );
}

const gradeFieldStyle = { width: 96, textAlign: "center", background: T.surfaceAlt, border: `1px solid ${T.line}`, borderRadius: 8, padding: "5px 6px", fontSize: 14, color: T.ink };

function GPAView({ courses, grades, setGrades, go }) {
  const [name, setName] = useState("");
  const [credits, setCredits] = useState("3");
  const [percent, setPercent] = useState("");
  const [grade, setGrade] = useState("");

  const add = () => {
    const nm = name.trim();
    if (!nm) return;
    setGrades([...grades, { id: uid(), name: nm, credits: Number(credits) || 0, percent: percent === "" ? "" : Number(percent), grade }]);
    setName(""); setCredits("3"); setPercent(""); setGrade("");
  };
  const update = (id, patch) => setGrades(grades.map((g) => (g.id === id ? { ...g, ...patch } : g)));
  const remove = (id) => setGrades(grades.filter((g) => g.id !== id));

  // Add any tracked courses that aren't already in the list, in one tap.
  const pullCourses = () => {
    const have = new Set(grades.map((g) => (g.name || "").trim().toLowerCase()));
    const fresh = courses
      .filter((c) => !have.has((c.name || "").trim().toLowerCase()))
      .map((c) => ({ id: uid(), name: c.name, code: c.code || "", credits: 3, percent: "", grade: "" }));
    if (fresh.length) setGrades([...grades, ...fresh]);
  };

  const { gpa, credits: totalCredits } = computeGPA(grades);
  const addLetter = letterFromPercent(percent) || grade;
  const untrackedCourses = courses.filter(
    (c) => !grades.some((g) => (g.name || "").trim().toLowerCase() === (c.name || "").trim().toLowerCase())
  );

  return (
    <div>

            {gpa === null ? "—" : gpa.toFixed(2)}
          </div>
          <div style={{ color: T.inkFaint, fontSize: 12.5 }}>on a 4.0 scale</div>
        </div>
        <div className="flex gap-6">
          <div>
            <div className="disp" style={{ fontSize: 26, fontWeight: 500 }}>{totalCredits || 0}</div>
            <div style={{ color: T.inkFaint, fontSize: 12 }}>credits counted</div>
          </div>
          <div>
            <div className="disp" style={{ fontSize: 26, fontWeight: 500 }}>{grades.length}</div>
            <div style={{ color: T.inkFaint, fontSize: 12 }}>courses</div>
          </div>
        </div>
      </div>

      {/* add a course */}
      <div className="rounded-2xl p-4 mb-6" style={{ background: T.surface, border: `1px solid ${T.line}` }}>
        <div className="flex flex-col sm:flex-row gap-3 sm:items-end">
          <div className="flex-1">
            <Label>Course</Label>
            <input style={inputStyle} value={name} placeholder="Consumer Behaviour"
              onChange={(e) => setName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} />
          </div>
          <div style={{ width: 90 }}>
            <Label>Credits</Label>
            <input style={inputStyle} type="number" min="0" step="0.5" value={credits}
              onChange={(e) => setCredits(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} />
          </div>
          <div style={{ width: 100 }}>
            <Label>Grade %</Label>
            <input style={inputStyle} type="number" min="0" max="100" value={percent} placeholder="87"
              onChange={(e) => setPercent(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} />
          </div>
          <div style={{ width: 96 }}>
            <Label>Letter</Label>
            {percent !== "" ? (
              <div style={{ paddingTop: 2 }}><LetterPill letter={addLetter} /></div>
            ) : (
              <select style={inputStyle} value={grade} onChange={(e) => setGrade(e.target.value)}>
                <option value="">—</option>
                {UBC_LETTERS.map((g) => <option key={g}>{g}</option>)}
              </select>
            )}
          </div>
          <Btn onClick={add}><Plus size={16} /> Add</Btn>
        </div>
        {untrackedCourses.length > 0 && (
          <button onClick={pullCourses} className="flex items-center gap-2 mt-3 px-1"
            style={{ color: T.accent, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>

            <div style={{ width: 90, textAlign: "center" }}>Credits</div>
            <div style={{ width: 100, textAlign: "center" }}>Grade %</div>
            <div style={{ width: 96, textAlign: "center" }}>Letter</div>
            <div style={{ width: 56, textAlign: "right" }}>Points</div>
            <div style={{ width: 24 }} />
          </div>
          {grades.map((g) => {
            const letter = rowLetter(g);
            const gp = gpaPoints(letter);
            const hasPercent = g.percent !== "" && g.percent !== null && g.percent !== undefined;
            return (
              <div key={g.id} className="flex items-center gap-3 px-4 py-2.5" style={{ borderBottom: `1px solid ${T.line}` }}>
                <input value={g.name} onChange={(e) => update(g.id, { name: e.target.value })}
                  className="flex-1 min-w-0" style={{ background: "transparent", border: "none", fontSize: 14.5, fontWeight: 500, color: T.ink, padding: 0 }} />
                <input type="number" min="0" step="0.5" value={g.credits}
                  onChange={(e) => update(g.id, { credits: e.target.value === "" ? "" : Number(e.target.value) })}
                  style={{ width: 90, textAlign: "center", background: T.surfaceAlt, border: `1px solid ${T.line}`, borderRadius: 8, padding: "5px 6px", fontSize: 14, color: T.ink }} />
                <input type="number" min="0" max="100" value={hasPercent ? g.percent : ""} placeholder="—"
                  onChange={(e) => update(g.id, { percent: e.target.value === "" ? "" : Number(e.target.value) })}
                  style={{ width: 100, textAlign: "center", background: T.surfaceAlt, border: `1px solid ${T.line}`, borderRadius: 8, padding: "5px 6px", fontSize: 14, color: T.ink }} />
                <div style={{ width: 96, display: "flex", justifyContent: "center" }}>
                  {hasPercent ? (
                    <LetterPill letter={letter} />
                  ) : (
                    <select value={g.grade || ""} onChange={(e) => update(g.id, { grade: e.target.value })} style={gradeFieldStyle}>
                      <option value="">—</option>
                      {UBC_LETTERS.map((opt) => <option key={opt}>{opt}</option>)}
                    </select>
                  )}
                </div>
                <div style={{ width: 56, textAlign: "right", color: T.inkFaint, fontSize: 13.5 }}>{gp === null ? "—" : gp.toFixed(1)}</div>
                <button onClick={() => remove(g.id)} title="Remove" style={{ width: 24, color: T.inkFaint, cursor: "pointer" }}><X size={15} /></button>
              </div>
            );
          })}
        </div>
      )}

      <div className="mt-4" style={{ color: T.inkFaint, fontSize: 12, lineHeight: 1.6 }}>
        <div><strong style={{ color: T.inkSoft }}>UBC scale</strong> — A+ 90–100, A 85–89, A− 80–84, B+ 76–79, B 72–75, B− 68–71, C+ 64–67, C 60–63, C− 55–59, D 50–54, F 0–49.</div>
        <div className="mt-1">GPA is weighted by credits on a 4.0 scale (A/A+ = 4.0, A− = 3.7, B+ = 3.3, B = 3.0, B− = 2.7, C+ = 2.3, C = 2.0, C− = 1.7, D = 1.0, F = 0.0). No percentage? Pick a letter by hand instead.</div>
      </div>
    </div>
  );
}

/* ===========================================================================
   NOTES  (+ summarize, + make flashcards)
=========================================================================== */
function NotesView({ courses, courseById, notes, setNotes, cards, setCards }) {
  const [composing, setComposing] = useState(false);
  const [title, setTitle] = useState("");
  const [courseId, setCourseId] = useState(courses[0]?.id || "");
  const [content, setContent] = useState("");
  const [busy, setBusy] = useState(null); // note id being processed
  const [busyKind, setBusyKind] = useState("");
  const [flash, setFlash] = useState("");

  const save = () => {
    if (!content.trim()) return;
    setNotes([{ id: uid(), title: title.trim() || "Untitled", courseId, content: content.trim(), summary: "", createdAt: todayISO() }, ...notes]);
    setTitle(""); setContent(""); setComposing(false);
  };
  const del = (id) => setNotes(notes.filter((n) => n.id !== id));

  const summarize = async (note) => {
    setBusy(note.id); setBusyKind("summary");
    try {
      const out = await askClaude(
        "You are a study aid. Summarise lecture or reading notes into a tight study brief. Return: a one-line TL;DR, then 4–7 bullet key points (start each with '• '), then one line 'Likely exam angle:'. Be concise and faithful to the source. No preamble.",
        note.content, 700
      );
      setNotes((prev) => prev.map((n) => (n.id === note.id ? { ...n, summary: out } : n)));
    } catch { setFlash("Couldn't reach Claude for the summary. Try again in a moment."); }
    setBusy(null); setBusyKind("");
  };

  const makeCards = async (note) => {
    setBusy(note.id); setBusyKind("cards");
    try {
      const out = await askClaude(
        "Turn study notes into flashcards. Return ONLY a JSON array, no markdown, no prose. Each item: {\"front\":\"question\",\"back\":\"answer\"}. 5–10 cards, each testing one fact or concept. Questions should be specific and answerable.",
        note.content, 1400
      );
      const clean = out.replace(/```json|```/g, "").trim();
      const arr = JSON.parse(clean);
      const fresh = arr
        .filter((x) => x.front && x.back)
        .map((x) => ({ id: uid(), courseId: note.courseId, front: x.front, back: x.back, box: 0, nextReview: todayISO(), source: note.title }));
      setCards((prev) => [...prev, ...fresh]);
      setFlash(`${fresh.length} cards added to “${courseById(note.courseId)?.name || "your deck"}”.`);
    } catch { setFlash("Couldn't build cards from that note. Try shortening it or run it again."); }
    setBusy(null); setBusyKind("");
  };

  useEffect(() => { if (flash) { const t = setTimeout(() => setFlash(""), 4000); return () => clearTimeout(t); } }, [flash]);

  if (courses.length === 0)
    return <Empty icon={FileText} title="Add a course first" sub="Notes attach to a course so flashcards and summaries stay organised. Pop over to Courses and add one." />;

  return (
    <div>
      {flash && <div className="mb-4 px-4 py-2.5 rounded-lg" style={{ background: T.accentSoft, color: T.accent, fontSize: 13.5, fontWeight: 500 }}>{flash}</div>}

      {!composing ? (
        <Btn onClick={() => { setCourseId(courses[0]?.id || ""); setComposing(true); }}><Plus size={16} /> New note</Btn>
      ) : (
        <div className="rounded-2xl p-4 mb-6" style={{ background: T.surface, border: `1px solid ${T.line}` }}>
          <div className="flex gap-3 mb-3">
            <input style={{ ...inputStyle, flex: 2 }} placeholder="Note title" value={title} onChange={(e) => setTitle(e.target.value)} />
            <select style={{ ...inputStyle, flex: 1 }} value={courseId} onChange={(e) => setCourseId(e.target.value)}>
              {courses.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <textarea style={{ ...inputStyle, minHeight: 160, resize: "vertical", lineHeight: 1.55 }}
            placeholder="Paste your lecture notes or a reading here…" value={content} onChange={(e) => setContent(e.target.value)} />
          <div className="flex gap-2 mt-3">
            <Btn onClick={save}>Save note</Btn>
            <Btn kind="ghost" onClick={() => setComposing(false)}>Cancel</Btn>
          </div>
        </div>
      )}

      <div className="flex flex-col gap-4 mt-6">
        {notes.length === 0 && !composing && (
          <Empty icon={FileText} title="No notes yet" sub="Paste a lecture or reading. Claude can boil it down to key points or spin it into flashcards." />
        )}
        {notes.map((n) => {
          const c = courseById(n.courseId);
          const isBusy = busy === n.id;
          return (
            <div key={n.id} className="rounded-2xl p-4" style={{ background: T.surface, border: `1px solid ${T.line}` }}>
              <div className="flex items-center gap-2 mb-2">
                <Dot hex={c?.color || T.inkFaint} />
                <span className="disp" style={{ fontSize: 17, fontWeight: 500 }}>{n.title}</span>
                <span style={{ color: T.inkFaint, fontSize: 12, marginLeft: "auto" }}>{n.createdAt}</span>
                <button onClick={() => del(n.id)} style={{ color: T.inkFaint, cursor: "pointer" }}><Trash2 size={15} /></button>
              </div>
              <div className="cn-scroll" style={{ color: T.inkSoft, fontSize: 13.5, lineHeight: 1.55, maxHeight: 96, overflow: "auto", whiteSpace: "pre-wrap" }}>{n.content}</div>

              {n.summary && (
                <div className="mt-3 p-3 rounded-xl" style={{ background: T.surfaceAlt, border: `1px solid ${T.line}` }}>
                  <div className="flex items-center gap-1.5 mb-1.5" style={{ color: T.accent, fontSize: 12, fontWeight: 700, letterSpacing: "0.04em" }}>
                    <Sparkles size={13} /> STUDY BRIEF
                  </div>
                  <div style={{ fontSize: 13.5, lineHeight: 1.55, whiteSpace: "pre-wrap" }}>{n.summary}</div>
                </div>
              )}

              <div className="flex gap-2 mt-3 flex-wrap">
                <Btn size="sm" kind="soft" onClick={() => summarize(n)} disabled={isBusy}>
                  {isBusy && busyKind === "summary" ? <Loader2 size={14} className="animate-spin" /> : <Sparkles size={14} />}
                  {n.summary ? "Re-summarise" : "Summarise"}
                </Btn>
                <Btn size="sm" kind="soft" onClick={() => makeCards(n)} disabled={isBusy}>
                  {isBusy && busyKind === "cards" ? <Loader2 size={14} className="animate-spin" /> : <Layers size={14} />}
                  Make flashcards
                </Btn>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ===========================================================================
   CARDS  (Leitner spaced repetition + manual add)
=========================================================================== */
function CardsView({ courses, courseById, cards, setCards }) {
  const [filter, setFilter] = useState("all");
  const [reviewing, setReviewing] = useState(false);
  const [queue, setQueue] = useState([]);
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [adding, setAdding] = useState(false);
  const [front, setFront] = useState("");
  const [back, setBack] = useState("");
  const [addCourse, setAddCourse] = useState(courses[0]?.id || "");

  const pool = filter === "all" ? cards : cards.filter((c) => c.courseId === filter);
  const due = pool.filter((c) => !c.nextReview || c.nextReview <= todayISO());

  const startReview = () => {
    if (due.length === 0) return;
    setQueue([...due].sort(() => Math.random() - 0.5));
    setIdx(0); setFlipped(false); setReviewing(true);
  };

  const grade = (good) => {
    const card = queue[idx];
    const box = good ? Math.min((card.box || 0) + 1, 5) : 0;
    const next = new Date(); next.setDate(next.getDate() + LEITNER_DAYS[box]);
    const nextReview = next.toISOString().slice(0, 10);
    setCards((prev) => prev.map((c) => (c.id === card.id ? { ...c, box, nextReview, lastReviewed: todayISO() } : c)));
    if (idx + 1 >= queue.length) { setReviewing(false); }
    else { setIdx(idx + 1); setFlipped(false); }
  };

  const addCard = () => {
    if (!front.trim() || !back.trim()) return;
    setCards([...cards, { id: uid(), courseId: addCourse, front: front.trim(), back: back.trim(), box: 0, nextReview: todayISO() }]);
    setFront(""); setBack("");
  };
  const del = (id) => setCards(cards.filter((c) => c.id !== id));

  if (reviewing && queue[idx]) {
    const card = queue[idx];
    const c = courseById(card.courseId);
    return (
      <div className="flex flex-col items-center">
        <div className="flex items-center justify-between w-full mb-5">
          <Btn kind="ghost" size="sm" onClick={() => setReviewing(false)}><ChevronLeft size={15} /> Exit</Btn>
          <span style={{ color: T.inkSoft, fontSize: 13 }}>{idx + 1} / {queue.length}</span>
        </div>
        <div onClick={() => setFlipped(!flipped)}
          className="w-full rounded-3xl flex flex-col items-center justify-center text-center px-8 cursor-pointer transition-colors"
          style={{ minHeight: 280, background: flipped ? T.surfaceAlt : T.surface, border: `1px solid ${T.line}` }}>
          <div className="flex items-center gap-2 mb-4" style={{ color: T.inkFaint, fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase" }}>
            <Dot hex={c?.color || T.inkFaint} size={7} /> {flipped ? "Answer" : "Question"}
          </div>
          <div className="disp" style={{ fontSize: 24, fontWeight: 500, lineHeight: 1.3, maxWidth: 520 }}>
            {flipped ? card.back : card.front}
          </div>
          {!flipped && <div style={{ color: T.inkFaint, fontSize: 12.5, marginTop: 18 }}>tap to reveal</div>}
        </div>
        {flipped && (
          <div className="flex gap-3 mt-5 w-full">
            <button onClick={() => grade(false)} className="flex-1 rounded-xl py-3 transition-opacity"
              style={{ background: "transparent", border: `1.5px solid ${T.red}`, color: T.red, fontWeight: 600, cursor: "pointer" }}>
              Didn't know
            </button>
            <button onClick={() => grade(true)} className="flex-1 rounded-xl py-3 transition-opacity"
              style={{ background: T.green, border: `1.5px solid ${T.green}`, color: "#fff", fontWeight: 600, cursor: "pointer" }}>
              Got it
            </button>
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      <div className="flex flex-col sm:flex-row sm:items-center gap-3 mb-6">
        <div className="rounded-2xl px-5 py-4 flex-1" style={{ background: T.surface, border: `1px solid ${T.line}` }}>
          <div style={{ color: T.inkSoft, fontSize: 13 }}>Ready to review</div>
          <div className="flex items-baseline gap-2">
            <span className="disp" style={{ fontSize: 36, fontWeight: 600 }}>{due.length}</span>
            <span style={{ color: T.inkFaint, fontSize: 13 }}>of {pool.length} cards</span>
          </div>
        </div>
        <Btn onClick={startReview} disabled={due.length === 0}><RotateCcw size={16} /> Start review</Btn>
      </div>

      <div className="flex items-center gap-2 mb-4 flex-wrap">
        <FilterChip active={filter === "all"} onClick={() => setFilter("all")} label="All decks" />
        {courses.map((c) => (
          <FilterChip key={c.id} active={filter === c.id} onClick={() => setFilter(c.id)} label={c.name} hex={c.color} />
        ))}
        <button onClick={() => { setAddCourse(filter === "all" ? courses[0]?.id : filter); setAdding(!adding); }}
          className="ml-auto flex items-center gap-1.5" style={{ color: T.accent, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
          <Plus size={14} /> Add card
        </button>
      </div>

      {adding && (
        <div className="rounded-2xl p-4 mb-5" style={{ background: T.surface, border: `1px solid ${T.line}` }}>
          <div className="flex gap-2 mb-2">
            <select style={{ ...inputStyle }} value={addCourse} onChange={(e) => setAddCourse(e.target.value)}>
              {courses.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <input style={{ ...inputStyle, marginBottom: 8 }} placeholder="Front (question)" value={front} onChange={(e) => setFront(e.target.value)} />
          <input style={{ ...inputStyle, marginBottom: 10 }} placeholder="Back (answer)" value={back} onChange={(e) => setBack(e.target.value)} />
          <Btn size="sm" onClick={addCard}>Add card</Btn>
        </div>
      )}

      {pool.length === 0 ? (
        <Empty icon={Layers} title="No cards in this deck"
          sub="Make some from a note over in Notes, or add one by hand above." />
      ) : (
        <div className="flex flex-col gap-2">
          {pool.map((c) => {
            const co = courseById(c.courseId);
            return (
              <div key={c.id} className="flex items-center gap-3 px-4 py-3 rounded-xl" style={{ background: T.surface, border: `1px solid ${T.line}` }}>
                <Dot hex={co?.color || T.inkFaint} />
                <div className="flex-1 min-w-0">
                  <div className="truncate" style={{ fontSize: 14, fontWeight: 500 }}>{c.front}</div>
                  <div className="truncate" style={{ color: T.inkFaint, fontSize: 12.5 }}>{c.back}</div>
                </div>
                <div className="flex items-center gap-1" title={`Box ${c.box || 0} of 5`}>
                  {[0,1,2,3,4].map((b) => (
                    <CircleDot key={b} size={9} style={{ color: b < (c.box || 0) ? T.green : T.line }} />
                  ))}
                </div>
                <button onClick={() => del(c.id)} style={{ color: T.inkFaint, cursor: "pointer" }}><X size={15} /></button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function FilterChip({ active, onClick, label, hex }) {
  return (
    <button onClick={onClick} className="flex items-center gap-1.5 px-3 py-1.5 rounded-full transition-colors"
      style={{ background: active ? T.ink : T.surface, color: active ? T.surface : T.inkSoft, border: `1px solid ${active ? T.ink : T.line}`, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>
      {hex && <Dot hex={hex} size={8} />} {label}
    </button>
  );
}

/* ===========================================================================
   WRITING  (outline + critique)
=========================================================================== */
function WritingView({ courses, courseById, papers, setPapers }) {
  const [openId, setOpenId] = useState(null);
  const [title, setTitle] = useState("");
  const [courseId, setCourseId] = useState(courses[0]?.id || "");

  const create = () => {
    if (!title.trim()) return;
    const p = { id: uid(), title: title.trim(), courseId, prompt: "", outline: "", draft: "", feedback: "" };
    setPapers([p, ...papers]); setTitle(""); setOpenId(p.id);
  };
  const update = (id, patch) => setPapers(papers.map((p) => (p.id === id ? { ...p, ...patch } : p)));
  const del = (id) => { setPapers(papers.filter((p) => p.id !== id)); if (openId === id) setOpenId(null); };

  const open = papers.find((p) => p.id === openId);
  if (open) return <PaperEditor paper={open} courses={courses} courseById={courseById} update={update} back={() => setOpenId(null)} />;

  return (
    <div>
      <div className="rounded-2xl p-4 mb-6" style={{ background: T.surface, border: `1px solid ${T.line}` }}>
        <div className="flex flex-col sm:flex-row gap-3 sm:items-end">
          <div className="flex-1">
            <Label>New paper</Label>
            <input style={inputStyle} placeholder="Working title" value={title}
              onChange={(e) => setTitle(e.target.value)} onKeyDown={(e) => e.key === "Enter" && create()} />
          </div>
          {courses.length > 0 && (
            <select style={{ ...inputStyle, width: 200 }} value={courseId} onChange={(e) => setCourseId(e.target.value)}>
              {courses.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          )}
          <Btn onClick={create}><Plus size={16} /> Start</Btn>
        </div>
      </div>

      {papers.length === 0 ? (
        <Empty icon={PenLine} title="No papers in progress"
          sub="Start one above. Claude can turn your prompt into an outline and give honest feedback on a draft — structure, argument, and line edits." />
      ) : (
        <div className="flex flex-col gap-2">
          {papers.map((p) => {
            const c = courseById(p.courseId);
            return (
              <div key={p.id} className="flex items-center gap-3 px-4 py-3.5 rounded-xl cursor-pointer transition-colors"
                style={{ background: T.surface, border: `1px solid ${T.line}` }} onClick={() => setOpenId(p.id)}>
                <Dot hex={c?.color || T.inkFaint} />
                <div className="flex-1 min-w-0">
                  <div className="truncate disp" style={{ fontSize: 16, fontWeight: 500 }}>{p.title}</div>
                  <div style={{ color: T.inkFaint, fontSize: 12.5 }}>
                    {c?.name || "No course"} · {p.draft ? `${p.draft.trim().split(/\s+/).length} words` : "no draft yet"}
                  </div>
                </div>
                <button onClick={(e) => { e.stopPropagation(); del(p.id); }} style={{ color: T.inkFaint, cursor: "pointer" }}><Trash2 size={15} /></button>
                <ChevronRight size={16} style={{ color: T.inkFaint }} />
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function PaperEditor({ paper, courses, courseById, update, back }) {
  const [prompt, setPrompt] = useState(paper.prompt);
  const [outline, setOutline] = useState(paper.outline);
  const [draft, setDraft] = useState(paper.draft);
  const [feedback, setFeedback] = useState(paper.feedback);
  const [busy, setBusy] = useState("");
  const [err, setErr] = useState("");
  const c = courseById(paper.courseId);

  // persist field edits up to parent (debounced-ish on blur)
  const flush = () => update(paper.id, { prompt, outline, draft, feedback });

  const genOutline = async () => {
    if (!prompt.trim()) { setErr("Add the essay prompt or your thesis first."); return; }
    setBusy("outline"); setErr("");
    try {
      const out = await askClaude(
        "You help a university student plan an essay. Given the prompt/thesis, produce a clear working outline: a sharpened thesis statement, then 3–5 section headings each with 2–3 sub-points, then a one-line note on what evidence each section needs. Use plain text with indentation, no markdown symbols like # or *.",
        prompt, 1200
      );
      setOutline(out); update(paper.id, { prompt, outline: out, draft, feedback });
    } catch { setErr("Couldn't generate an outline just now. Try again."); }
    setBusy("");
  };

  const critique = async () => {
    if (!draft.trim()) { setErr("Paste a draft to get feedback on."); return; }
    setBusy("feedback"); setErr("");
    try {
      const out = await askClaude(
        "You are a sharp but encouraging writing tutor for a business student. Critique this draft in four short labelled sections: ARGUMENT (is the thesis clear and defended?), STRUCTURE (does it flow, any gaps?), CLARITY (wordiness, jargon, weak sentences — give 2–3 specific examples with fixes), NEXT (the single highest-impact change). Be specific and honest, not flattering. Plain text, no markdown symbols.",
        (prompt ? `PROMPT/THESIS:\n${prompt}\n\nDRAFT:\n` : "DRAFT:\n") + draft, 1600
      );
      setFeedback(out); update(paper.id, { prompt, outline, draft, feedback: out });
    } catch { setErr("Couldn't fetch feedback just now. Try again."); }
    setBusy("");
  };

  const wordCount = draft.trim() ? draft.trim().split(/\s+/).length : 0;

  return (
    <div>
      <div className="flex items-center gap-3 mb-5">
        <Btn kind="ghost" size="sm" onClick={() => { flush(); back(); }}><ChevronLeft size={15} /> All papers</Btn>
        <div className="flex items-center gap-2 ml-1">
          <Dot hex={c?.color || T.inkFaint} />
          <span className="disp" style={{ fontSize: 22, fontWeight: 500 }}>{paper.title}</span>
        </div>
      </div>

      {err && <div className="mb-4 px-4 py-2.5 rounded-lg" style={{ background: "#F6E3E1", color: T.red, fontSize: 13.5 }}>{err}</div>}

      <div className="grid md:grid-cols-2 gap-4">
        {/* left: prompt + outline */}
        <div className="flex flex-col gap-4">
          <Panel title="Prompt / thesis">
            <textarea style={{ ...inputStyle, minHeight: 90, resize: "vertical", lineHeight: 1.5 }} value={prompt}
              placeholder="Paste the essay question, or write your thesis…" onChange={(e) => setPrompt(e.target.value)} onBlur={flush} />
            <Btn size="sm" kind="soft" onClick={genOutline} disabled={busy === "outline"}>
              {busy === "outline" ? <Loader2 size={14} className="animate-spin" /> : <Sparkles size={14} />} Build outline
            </Btn>
          </Panel>
          {outline && (
            <Panel title="Outline" accent>
              <div style={{ fontSize: 13.5, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{outline}</div>
            </Panel>
          )}
        </div>

        {/* right: draft + feedback */}
        <div className="flex flex-col gap-4">
          <Panel title={`Draft · ${wordCount} words`}>
            <textarea style={{ ...inputStyle, minHeight: 200, resize: "vertical", lineHeight: 1.6 }} value={draft}
              placeholder="Write or paste your draft here…" onChange={(e) => setDraft(e.target.value)} onBlur={flush} />
            <Btn size="sm" kind="soft" onClick={critique} disabled={busy === "feedback"}>
              {busy === "feedback" ? <Loader2 size={14} className="animate-spin" /> : <Sparkles size={14} />} Critique draft
            </Btn>
          </Panel>
          {feedback && (
            <Panel title="Feedback" accent>
              <div style={{ fontSize: 13.5, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{feedback}</div>
            </Panel>
          )}
        </div>
      </div>
    </div>
  );
}

function Panel({ title, children, accent }) {
  return (
    <div className="rounded-2xl p-4" style={{ background: T.surface, border: `1px solid ${accent ? T.accentSoft : T.line}` }}>
      <div className="flex items-center gap-1.5 mb-2.5" style={{ color: accent ? T.accent : T.inkSoft, fontSize: 12, fontWeight: 700, letterSpacing: "0.04em", textTransform: "uppercase" }}>
        {accent && <Sparkles size={13} />} {title}
      </div>
      <div className="flex flex-col gap-3">{children}</div>
    </div>
  );
}

/* ===========================================================================
   IMPORT  (Canvas deadlines + Workday timetable, via paste or screenshot)
=========================================================================== */
function ImportModal({ courses, setCourses, assignments, setAssignments, schedule, setSchedule, courseById, onClose,
  canvasEndpoint, setCanvasEndpoint, syncCanvas, syncing, syncErr, syncMsg, lastSync }) {
  const [mode, setMode] = useState(canvasEndpoint ? "live" : "live");
  const [endpoint, setEndpoint] = useState(canvasEndpoint || "");
  const [apiKey, setApiKey] = useState(ANTHROPIC_KEY);
  const [text, setText] = useState("");
  const [image, setImage] = useState(null);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [parsed, setParsed] = useState(null);
  const [sel, setSel] = useState({});
  const [dueEdits, setDueEdits] = useState({});

  const reset = () => { setParsed(null); setSel({}); setDueEdits({}); setErr(""); };
  const switchMode = (m) => { setMode(m); setText(""); setImage(null); reset(); };

  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const ok = ["image/png", "image/jpeg", "image/jpg", "image/gif", "image/webp"];
    const r = new FileReader();
    r.onload = () => setImage({
      data: String(r.result).split(",")[1],
      media_type: ok.includes(f.type) ? (f.type === "image/jpg" ? "image/jpeg" : f.type) : "image/png",
      name: f.name,
    });
    r.readAsDataURL(f);
  };

  const today = todayISO();
  const canvasSys = `You read a student's Canvas assignments (pasted text or a screenshot) and extract structured deadlines. Today is ${today}. Return ONLY a JSON object: {"assignments":[{"course":"","code":"","title":"","due":"YYYY-MM-DD","type":""}]}. "type" must be one of Essay, Exam, Reading, Quiz, Project, Problem set — infer it from the title. Resolve relative or partial dates to the nearest upcoming real date relative to today; if no due date is shown leave "due" empty. "course" is the readable name if visible, "code" like "COMM 296" if visible. No prose, no markdown.`;
  const workdaySys = `You read a student's Workday class schedule (pasted text or a screenshot) and extract their weekly timetable plus any exam dates. Today is ${today}. Return ONLY JSON: {"classes":[{"course":"","code":"","day":"Mon","start":"HH:MM","end":"HH:MM","location":""}],"exams":[{"course":"","code":"","title":"","due":"YYYY-MM-DD"}]}. "day" is one of Mon Tue Wed Thu Fri Sat Sun; use 24-hour times. Make one entry per meeting day (a class on Mon and Wed becomes two entries). If no exams are shown use "exams":[]. No prose, no markdown.`;

  const run = async () => {
    if (!text.trim() && !image) { setErr("Paste your list, or add a screenshot first."); return; }
    setBusy(true); setErr("");
    try {
      const parts = [];
      if (image) parts.push({ type: "image", source: { type: "base64", media_type: image.media_type, data: image.data } });
      parts.push({ type: "text", text: text.trim() || "Extract everything from the attached screenshot." });
      const out = await askClaudeParts(mode === "canvas" ? canvasSys : workdaySys, parts, 2000);
      const obj = parseJSONLoose(out);
      let p;
      if (mode === "canvas") p = { assignments: Array.isArray(obj.assignments) ? obj.assignments : (Array.isArray(obj) ? obj : []) };
      else p = { classes: Array.isArray(obj.classes) ? obj.classes : [], exams: Array.isArray(obj.exams) ? obj.exams : [] };
      const s = {};
      (p.assignments || []).forEach((_, i) => (s["a" + i] = true));
      (p.classes || []).forEach((_, i) => (s["c" + i] = true));
      (p.exams || []).forEach((_, i) => (s["e" + i] = true));
      setParsed(p); setSel(s);
      const total = (p.assignments || []).length + (p.classes || []).length + (p.exams || []).length;
      if (total === 0) setErr("Nothing came back. Try a clearer screenshot, or paste the list as text.");
    } catch (e) {
      setErr("Couldn't read that. Try pasting the text directly, or a sharper screenshot.");
    }
    setBusy(false);
  };

  const toggle = (k) => setSel((s) => ({ ...s, [k]: !s[k] }));

  const commit = () => {
    const working = [...courses];
    const findOrCreate = (name, code) => {
      const n = (name || "").trim(), cd = (code || "").trim();
      if (!n && !cd) return null;
      const hit = working.find((x) =>
        (n && x.name.toLowerCase() === n.toLowerCase()) ||
        (cd && x.code && x.code.toLowerCase() === cd.toLowerCase()));
      if (hit) return hit.id;
      const color = COURSE_COLORS[working.length % COURSE_COLORS.length].hex;
      const nc = { id: uid(), name: n || cd, code: cd, color };
      working.push(nc);
      return nc.id;
    };

    if (mode === "canvas") {
      const adds = (parsed.assignments || []).map((a, i) => ({ a, i })).filter(({ i }) => sel["a" + i])
        .map(({ a, i }) => ({
          id: uid(), courseId: findOrCreate(a.course, a.code), title: a.title || "Untitled",
          due: dueEdits["a" + i] ?? a.due ?? "", type: TYPES.includes(a.type) ? a.type : "Essay", status: "todo",
        })).filter((x) => x.courseId);
      setAssignments([...assignments, ...adds]);
    } else {
      const cadds = (parsed.classes || []).map((c, i) => ({ c, i })).filter(({ i }) => sel["c" + i])
        .map(({ c }) => ({
          id: uid(), courseId: findOrCreate(c.course, c.code), day: c.day,
          start: c.start, end: c.end, location: c.location || "",
        })).filter((x) => x.courseId && x.day);
      const eadds = (parsed.exams || []).map((e, i) => ({ e, i })).filter(({ i }) => sel["e" + i])
        .map(({ e, i }) => ({
          id: uid(), courseId: findOrCreate(e.course, e.code), title: e.title || "Exam",
          due: dueEdits["e" + i] ?? e.due ?? "", type: "Exam", status: "todo",
        })).filter((x) => x.courseId);
      if (cadds.length) setSchedule([...schedule, ...cadds]);
      if (eadds.length) setAssignments([...assignments, ...eadds]);
    }
    setCourses(working);
    onClose();
  };

  const selectedCount = Object.values(sel).filter(Boolean).length;

  return (
    <div className="fixed inset-0 z-50 flex items-start sm:items-center justify-center p-3 sm:p-6"
      style={{ background: "rgba(33,28,24,0.42)" }} onClick={onClose}>
      <div className="cn-scroll w-full rounded-2xl"
        style={{ background: T.bg, border: `1px solid ${T.line}`, maxWidth: 680, maxHeight: "90vh", overflow: "auto" }}
        onClick={(e) => e.stopPropagation()}>
        <div className="flex items-center justify-between px-5 py-4 sticky top-0" style={{ background: T.bg, borderBottom: `1px solid ${T.line}`, zIndex: 1 }}>
          <div className="disp" style={{ fontSize: 20, fontWeight: 500 }}>Import</div>
          <button onClick={onClose} style={{ color: T.inkSoft, cursor: "pointer" }}><X size={18} /></button>
        </div>

        <div className="px-5 py-4">
          <div className="flex gap-1 p-1 rounded-xl mb-4" style={{ background: T.surfaceAlt, border: `1px solid ${T.line}` }}>
            {[["live", "Canvas (live)"], ["canvas", "Canvas (paste)"], ["workday", "Workday"]].map(([m, label]) => (
              <button key={m} onClick={() => switchMode(m)} className="flex-1 py-2 rounded-lg transition-colors"
                style={{ background: mode === m ? T.surface : "transparent", color: mode === m ? T.ink : T.inkSoft, fontWeight: 600, fontSize: 13, border: mode === m ? `1px solid ${T.line}` : "1px solid transparent", cursor: "pointer" }}>
                {label}
              </button>
            ))}
          </div>

          {mode === "live" && (
            <div>
              <div className="flex items-start gap-2 p-3 rounded-xl mb-3" style={{ background: T.accentSoft }}>
                <Cloud size={16} style={{ color: T.accent, marginTop: 2, flexShrink: 0 }} />
                <div style={{ color: T.accent, fontSize: 13, lineHeight: 1.5 }}>
                  A real link to Canvas. Deploy the little bridge (see the setup file), then paste its URL here — Carnet re-syncs every time you open it. Your Canvas token stays on your own server.
                </div>
              </div>
              <Label>Your Canvas bridge URL</Label>
              <input style={inputStyle} placeholder="https://your-project.vercel.app/api/canvas?key=…"
                value={endpoint} onChange={(e) => setEndpoint(e.target.value)} />
              <div className="mt-4">
                <Label>Anthropic API key — optional (turns on the Claude buttons)</Label>
                <input style={inputStyle} type="password" placeholder="sk-ant-…  (leave blank to skip)"
                  value={apiKey} onChange={(e) => { const v = e.target.value.trim(); setApiKey(e.target.value); ANTHROPIC_KEY = v; try { localStorage.setItem("uni:anthropicKey", v); } catch (_) {} }} />
                <div style={{ color: T.inkFaint, fontSize: 12, marginTop: 4 }}>Live Canvas sync works without this. A key switches on Summarise, Flashcards, and essay feedback. Stored only in this browser.</div>
              </div>
              <div className="flex items-center gap-2 mt-3 flex-wrap">
                <Btn onClick={async () => { setCanvasEndpoint(endpoint.trim()); await syncCanvas(endpoint.trim()); }} disabled={!endpoint.trim() || syncing}>
                  {syncing ? <><Loader2 size={15} className="animate-spin" /> Syncing…</> : <><RefreshCw size={15} /> Save & sync</>}
                </Btn>
                {canvasEndpoint && !syncing && (
                  <Btn kind="ghost" onClick={() => { setCanvasEndpoint(""); setEndpoint(""); }}>Disconnect</Btn>
                )}
                {lastSync && <span style={{ color: T.inkFaint, fontSize: 12 }}>last synced {new Date(lastSync).toLocaleString()}</span>}
              </div>
              {syncMsg && <div className="mt-3 px-3 py-2 rounded-lg" style={{ background: T.accentSoft, color: T.accent, fontSize: 13 }}>{syncMsg}</div>}
              {syncErr && <div className="mt-3 px-3 py-2 rounded-lg" style={{ background: "#F6E3E1", color: T.red, fontSize: 13 }}>{syncErr}</div>}
            </div>
          )}

          {mode === "workday" && !parsed && (
            <div className="flex items-start gap-2 p-3 rounded-xl mb-3" style={{ background: T.surfaceAlt, border: `1px solid ${T.line}` }}>
              <CalendarDays size={16} style={{ color: T.inkSoft, marginTop: 2, flexShrink: 0 }} />
              <div style={{ color: T.inkSoft, fontSize: 12.5, lineHeight: 1.5 }}>
                Workday has no student API, so there's no live link to build — this reads a paste or screenshot instead. Your timetable only changes once a term, so it's a one-time thing.
              </div>
            </div>
          )}

          {mode !== "live" && (!parsed ? (
            <>
              <div style={{ color: T.inkSoft, fontSize: 13.5, lineHeight: 1.5, marginBottom: 12 }}>
                {mode === "canvas"
                  ? "Open your Canvas Assignments or Calendar list, then paste it below — or drop a screenshot. I'll pull out each assignment and its due date."
                  : "Open your Workday class schedule, then paste it or drop a screenshot. I'll build your weekly timetable, and grab exam dates if they're shown."}
              </div>
              <textarea style={{ ...inputStyle, minHeight: 130, resize: "vertical", lineHeight: 1.5 }}
                placeholder={mode === "canvas" ? "Paste your Canvas assignments here…" : "Paste your Workday schedule here…"}
                value={text} onChange={(e) => setText(e.target.value)} />
              <div className="flex items-center gap-3 mt-3 flex-wrap">
                <label className="flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer" style={{ border: `1px dashed ${T.line}`, color: T.inkSoft, fontSize: 13, fontWeight: 600 }}>
                  <ImagePlus size={15} /> {image ? "Change screenshot" : "Add screenshot"}
                  <input type="file" accept="image/*" onChange={onFile} style={{ display: "none" }} />
                </label>
                {image && <span style={{ color: T.green, fontSize: 12.5 }}>✓ {image.name}</span>}
                <div className="ml-auto">
                  <Btn onClick={run} disabled={busy}>
                    {busy ? <><Loader2 size={15} className="animate-spin" /> Reading…</> : <><Sparkles size={15} /> Read it</>}
                  </Btn>
                </div>
              </div>
              {err && <div className="mt-3 px-3 py-2 rounded-lg" style={{ background: "#F6E3E1", color: T.red, fontSize: 13 }}>{err}</div>}
            </>
          ) : (
            <>
              <div style={{ color: T.inkSoft, fontSize: 13, marginBottom: 10 }}>
                Review what I found, untick anything you don't want, fix dates if needed, then save.
              </div>
              {err && <div className="mb-3 px-3 py-2 rounded-lg" style={{ background: "#F6E3E1", color: T.red, fontSize: 13 }}>{err}</div>}

              {mode === "canvas" && (
                <div className="flex flex-col gap-2">
                  {(parsed.assignments || []).map((a, i) => (
                    <ReviewRow key={"a" + i} checked={!!sel["a" + i]} onToggle={() => toggle("a" + i)}
                      title={a.title || "Untitled"} sub={`${a.course || a.code || "—"} · ${TYPES.includes(a.type) ? a.type : "Essay"}`}
                      due={dueEdits["a" + i] ?? a.due ?? ""} onDue={(v) => setDueEdits((d) => ({ ...d, ["a" + i]: v }))} />
                  ))}
                </div>
              )}

              {mode === "workday" && (
                <>
                  {(parsed.classes || []).length > 0 && <SectionLabel icon={CalendarDays}>Weekly classes</SectionLabel>}
                  <div className="flex flex-col gap-2">
                    {(parsed.classes || []).map((c, i) => (
                      <ReviewRow key={"c" + i} checked={!!sel["c" + i]} onToggle={() => toggle("c" + i)}
                        title={c.course || c.code || "Class"}
                        sub={`${c.day || "?"} · ${c.start || "?"}${c.end ? `–${c.end}` : ""}${c.location ? ` · ${c.location}` : ""}`} />
                    ))}
                  </div>
                  {(parsed.exams || []).length > 0 && <SectionLabel icon={CalendarDays}>Exams</SectionLabel>}
                  <div className="flex flex-col gap-2">
                    {(parsed.exams || []).map((e, i) => (
                      <ReviewRow key={"e" + i} checked={!!sel["e" + i]} onToggle={() => toggle("e" + i)}
                        title={e.title || "Exam"} sub={`${e.course || e.code || "—"} · Exam`}
                        due={dueEdits["e" + i] ?? e.due ?? ""} onDue={(v) => setDueEdits((d) => ({ ...d, ["e" + i]: v }))} />
                    ))}
                  </div>
                </>
              )}

              <div className="flex items-center gap-2 mt-5">
                <Btn onClick={commit} disabled={selectedCount === 0}><Check size={16} /> Save {selectedCount} to Carnet</Btn>
                <Btn kind="ghost" onClick={reset}>Back</Btn>
              </div>
            </>
          ))}
        </div>
      </div>
    </div>
  );
}

function SectionLabel({ icon: Icon, children }) {
  return (
    <div className="flex items-center gap-1.5 mt-4 mb-2" style={{ color: T.inkSoft, fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase" }}>
      <Icon size={13} /> {children}
    </div>
  );
}

function ReviewRow({ checked, onToggle, title, sub, due, onDue }) {
  return (
    <div className="flex items-center gap-3 px-3 py-2.5 rounded-xl" style={{ background: T.surface, border: `1px solid ${T.line}`, opacity: checked ? 1 : 0.5 }}>
      <button onClick={onToggle} style={{ width: 20, height: 20, borderRadius: 6, border: `1.5px solid ${checked ? T.green : T.line}`, background: checked ? T.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", flexShrink: 0 }}>
        {checked && <Check size={13} color="#fff" strokeWidth={3} />}
      </button>
      <div className="flex-1 min-w-0">
        <div className="truncate" style={{ fontSize: 14, fontWeight: 600 }}>{title}</div>
        <div className="truncate" style={{ color: T.inkFaint, fontSize: 12.5 }}>{sub}</div>
      </div>
      {onDue && (
        <input type="date" value={due || ""} onChange={(e) => onDue(e.target.value)}
          style={{ background: T.surfaceAlt, border: `1px solid ${T.line}`, borderRadius: 8, padding: "5px 8px", fontSize: 12.5, color: T.ink }} />
      )}
    </div>
  );
}

function LockScreen({ onTry }) {
  const [pw, setPw] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const submit = async () => {
    if (busy || !pw.trim()) return;
    setBusy(true); setErr("");
    const ok = await onTry(pw);
    if (!ok) { setErr("That password didn't work. Try again."); setBusy(false); setPw(""); }
  };
  return (
    <div style={{ minHeight: "100vh", background: T.bg, color: T.ink, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: "'Hanken Grotesk', system-ui, sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&display=swap'); .disp{font-family:'Fraunces',Georgia,serif;} input:focus{border-color:${T.accent}!important;}`}</style>
      <div style={{ width: "100%", maxWidth: 360, background: T.surface, border: `1px solid ${T.line}`, borderRadius: 20, padding: "34px 28px", boxShadow: "0 18px 50px -28px rgba(33,28,24,0.5)" }}>
        <div style={{ fontSize: 40, textAlign: "center", marginBottom: 6 }}>📓</div>
        <div className="disp" style={{ fontSize: 30, fontWeight: 600, letterSpacing: "-0.02em", textAlign: "center" }}>Carnet</div>
        <div style={{ color: T.inkSoft, fontSize: 13.5, textAlign: "center", marginTop: 6, marginBottom: 22 }}>Enter your password to open your desk.</div>
        <input
          type="password"
          value={pw}
          autoFocus
          onChange={(e) => { setPw(e.target.value); if (err) setErr(""); }}
          onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
          placeholder="Password"
          style={{ width: "100%", boxSizing: "border-box", background: T.surfaceAlt, border: `1px solid ${T.line}`, borderRadius: 12, padding: "12px 14px", fontSize: 15, color: T.ink, marginBottom: 12 }}
        />
        {err && <div style={{ color: T.red, fontSize: 13, marginBottom: 12 }}>{err}</div>}
        <button
          onClick={submit}
          disabled={busy}
          style={{ width: "100%", background: T.accent, color: "#fff", border: "none", borderRadius: 12, padding: "12px 14px", fontSize: 15, fontWeight: 600, cursor: busy ? "default" : "pointer", opacity: busy ? 0.7 : 1 }}>
          {busy ? "Checking\u2026" : "Unlock"}
        </button>
        <div style={{ color: T.inkFaint, fontSize: 11.5, textAlign: "center", marginTop: 16, lineHeight: 1.5 }}>
          Your deadlines are private. Without the password this stays empty.
        </div>
      </div>
    </div>
  );
}

(function () {
  try {
    var root = document.getElementById("root");
    var el = React.createElement(Carnet);
    if (typeof ReactDOM !== "undefined" && ReactDOM.createRoot) { ReactDOM.createRoot(root).render(el); }
    else if (typeof ReactDOM !== "undefined" && ReactDOM.render) { ReactDOM.render(el, root); }
    else { throw new Error("ReactDOM not available"); }
  } catch (err) {
    var r = document.getElementById("root");
    if (r) r.innerHTML = '<pre style="padding:18px;white-space:pre-wrap;color:#7B2D3A;font:13px ui-monospace,monospace">RENDER ERROR\n' + (err && (err.stack || err.message) || err) + '</pre>';
  }
})();

</script>
</body>
</html>
